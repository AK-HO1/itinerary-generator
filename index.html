<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Itinerary Generator</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f7f7;
      color: #222;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      background: #fff;
      border-bottom: 1px solid #e5e5e5;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar h1 {
      font-size: 17px;
      font-weight: 700;
      color: #FF385C;
      white-space: nowrap;
      margin-right: 8px;
    }

    .topbar input {
      flex: 1;
      max-width: 260px;
      padding: 10px 14px;
      border: 1.5px solid #ddd;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s;
    }
    .topbar input:focus { border-color: #FF385C; }
    .topbar input::placeholder { color: #aaa; }

    .btn-generate {
      background: #FF385C;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 22px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }
    .btn-generate:hover:not(:disabled) { background: #e0314f; }
    .btn-generate:disabled { opacity: 0.55; cursor: not-allowed; }

    /* Spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-generate.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error banner ── */
    .error-banner {
      display: none;
      background: #fff2f2;
      border: 1px solid #ffc5c5;
      color: #c0392b;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 14px;
      margin: 20px 32px 0;
    }
    .error-banner.visible { display: block; }

    /* ── Two-column layout ── */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 24px 32px;
      max-width: 1400px;
      margin: 0 auto;
    }
    @media (max-width: 820px) {
      .workspace { grid-template-columns: 1fr; }
    }

    /* ── Panel shared styles ── */
    .panel {
      background: #fff;
      border-radius: 16px;
      border: 1px solid #e5e5e5;
      overflow: hidden;
    }

    .panel-header {
      padding: 16px 20px 12px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header h2 {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #555;
    }

    .panel-body {
      padding: 20px;
    }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      color: #bbb;
      gap: 10px;
      text-align: center;
    }
    .empty-state svg { opacity: 0.35; }
    .empty-state p { font-size: 14px; }

    /* ── Visual preview (LEFT panel) ── */
    .preview-list {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* Each card is self-contained — ready for Edit buttons later */
    .stop-card {
      display: flex;
      gap: 16px;
      padding: 16px 0;
      position: relative;
    }

    /* Vertical connector line */
    .stop-card:not(:last-child)::after {
      content: "";
      position: absolute;
      left: 125px; /* center of the 250px thumbnail */
      top: calc(16px + 250px); /* below thumbnail */
      bottom: 0;
      width: 2px;
      background: #f0f0f0;
    }

    /* Thumbnail */
    .stop-thumb {
      flex-shrink: 0;
      width: 250px;
      height: 250px;
      border-radius: 12px;
      overflow: hidden;
      background: #f0f0f0;
      position: relative;
    }

    .stop-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Placeholder when no image */
    .stop-thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #e8e8e8;
      font-size: 10px;
      color: #999;
      text-align: center;
      padding: 4px;
      line-height: 1.2;
      font-weight: 500;
    }

    .stop-content {
      flex: 1;
      min-width: 0;
      /* Future: add padding-right for Edit buttons */
    }

    .stop-title {
      font-size: 15px;
      font-weight: 700;
      color: #111;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .stop-desc {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    /* Future Edit buttons — placeholder area, not built yet */
    .stop-actions {
      display: none; /* shown later per spec */
      gap: 6px;
      margin-top: 8px;
    }
    .btn-edit-stub {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
      color: #555;
    }

    /* ── JSON panel (RIGHT) ── */
    .json-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-copy {
      background: #fff;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      color: #444;
      transition: border-color 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-copy:hover { border-color: #FF385C; color: #FF385C; }
    .btn-copy.copied { border-color: #27ae60; color: #27ae60; }

    .json-output {
      background: #fafafa;
      border-radius: 10px;
      padding: 16px;
      font-family: "SF Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
      font-size: 12.5px;
      line-height: 1.6;
      color: #333;
      overflow-x: auto;
      white-space: pre;
      max-height: 70vh;
      overflow-y: auto;
      border: 1px solid #eee;
    }

    /* Simple JSON syntax colouring */
    .json-key    { color: #905 ; }
    .json-string { color: #07a; }
    .json-number { color: #905; }
    .json-bool   { color: #c80; }
    .json-null   { color: #c80; }
  </style>
</head>
<body>

  <!-- ── Top bar ── -->
  <header class="topbar">
    <h1>✦ Itinerary Generator</h1>
    <input
      type="text"
      id="tgid-input"
      placeholder="Experience ID (e.g. 6274)"
      autocomplete="off"
      autocorrect="off"
      spellcheck="false"
    />
    <button class="btn-generate" id="btn-generate">
      <span class="spinner"></span>
      <span class="btn-label">Generate</span>
    </button>
  </header>

  <!-- ── Error banner ── -->
  <div class="error-banner" id="error-banner"></div>

  <!-- ── Workspace ── -->
  <main class="workspace">

    <!-- LEFT: Visual preview -->
    <section class="panel" id="preview-panel">
      <div class="panel-header">
        <h2>What you'll do</h2>
      </div>
      <div class="panel-body" id="preview-body">
        <div class="empty-state" id="preview-empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <path d="M3 9h18M9 21V9"/>
          </svg>
          <p>Enter an experience ID and click Generate<br/>to see the visual preview here.</p>
        </div>
        <div class="preview-list" id="preview-list" style="display:none;"></div>
      </div>
    </section>

    <!-- RIGHT: JSON output -->
    <section class="panel" id="json-panel">
      <div class="panel-header">
        <h2>JSON Output</h2>
        <div class="json-toolbar">
          <button class="btn-copy" id="btn-copy" style="display:none;" aria-label="Copy JSON to clipboard">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            Copy to Clipboard
          </button>
        </div>
      </div>
      <div class="panel-body">
        <div class="empty-state" id="json-empty">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          <p>The formatted JSON will appear here.</p>
        </div>
        <div id="json-output-wrap" style="display:none;">
          <pre class="json-output" id="json-output" aria-label="JSON output"></pre>
        </div>
      </div>
    </section>

  </main>

  <script>
    // ── DOM refs ──
    const input      = document.getElementById("tgid-input");
    const btnGen     = document.getElementById("btn-generate");
    const btnCopy    = document.getElementById("btn-copy");
    const errBanner  = document.getElementById("error-banner");
    const previewEmpty = document.getElementById("preview-empty");
    const previewList  = document.getElementById("preview-list");
    const jsonEmpty    = document.getElementById("json-empty");
    const jsonWrap     = document.getElementById("json-output-wrap");
    const jsonOut      = document.getElementById("json-output");

    // ── State ──
    let currentJson = null;

    // ── Enter key shortcut ──
    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleGenerate();
    });

    btnGen.addEventListener("click", handleGenerate);
    btnCopy.addEventListener("click", handleCopy);

    // ── Generate ──
    async function handleGenerate() {
      const experienceId = input.value.trim();

      // Frontend validation
      if (!experienceId) {
        showError("Please enter an Experience ID.");
        return;
      }
      if (!/^\d+$/.test(experienceId)) {
        showError("Experience ID should be a number (e.g. 6274).");
        return;
      }

      setLoading(true);
      hideError();
      clearOutputs();

      try {
        const res = await fetch("/api/generate", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ experienceId }),
        });

        const payload = await res.json();

        if (!payload.success) {
          showError(payload.error || "Something went wrong. Please try again.");
          return;
        }

        renderResults(payload.data);
      } catch (err) {
        showError("Network error — is the server running?");
        console.error(err);
      } finally {
        setLoading(false);
      }
    }

    // ── Render ──
    function renderResults(data) {
      currentJson = data;
      renderPreview(data.sections);
      renderJson(data);
    }

    function renderPreview(sections) {
      previewList.innerHTML = "";

      sections.forEach((section) => {
        const card = document.createElement("div");
        card.className = "stop-card";
        // Data attributes for future Edit button hooks
        card.dataset.sectionId = section.id;

        // Thumbnail
        const thumb = document.createElement("div");
        thumb.className = "stop-thumb";

        if (section.mediaUrls && section.mediaUrls[0]) {
          const img = document.createElement("img");
          img.src = section.mediaUrls[0];
          img.alt = section.name;
          img.loading = "lazy";
          // Fallback if image fails
          img.onerror = () => {
            img.replaceWith(makePlaceholder(section.name));
          };
          thumb.appendChild(img);
        } else {
          thumb.appendChild(makePlaceholder(section.name));
        }

        // Content
        const content = document.createElement("div");
        content.className = "stop-content";

        const title = document.createElement("div");
        title.className = "stop-title";
        title.textContent = section.name;

        const desc = document.createElement("div");
        desc.className = "stop-desc";
        desc.textContent = section.description;

        // Future: Edit buttons (hidden, structure ready)
        const actions = document.createElement("div");
        actions.className = "stop-actions";
        actions.innerHTML = `
          <button class="btn-edit-stub" data-action="edit-image">Edit image</button>
          <button class="btn-edit-stub" data-action="edit-text">Edit text</button>
        `;

        content.appendChild(title);
        content.appendChild(desc);
        content.appendChild(actions); // hidden via CSS until feature is built

        card.appendChild(thumb);
        card.appendChild(content);
        previewList.appendChild(card);
      });

      previewEmpty.style.display = "none";
      previewList.style.display = "flex";
    }

    function makePlaceholder(name) {
      const el = document.createElement("div");
      el.className = "stop-thumb-placeholder";
      el.textContent = name;
      return el;
    }

    function renderJson(data) {
      const formatted = JSON.stringify(data, null, 2);
      jsonOut.innerHTML = syntaxHighlight(formatted);

      jsonEmpty.style.display = "none";
      jsonWrap.style.display = "block";
      btnCopy.style.display = "flex";
    }

    // ── Copy ──
    async function handleCopy() {
      if (!currentJson) return;
      try {
        await navigator.clipboard.writeText(JSON.stringify(currentJson, null, 2));
        btnCopy.classList.add("copied");
        btnCopy.querySelector("span") // update label if span exists
          ? null : null;
        const label = btnCopy.childNodes[btnCopy.childNodes.length - 1];
        if (label && label.nodeType === Node.TEXT_NODE) {
          label.textContent = " Copied!";
        }
        setTimeout(() => {
          btnCopy.classList.remove("copied");
          const l2 = btnCopy.childNodes[btnCopy.childNodes.length - 1];
          if (l2 && l2.nodeType === Node.TEXT_NODE) l2.textContent = " Copy to Clipboard";
        }, 2000);
      } catch {
        // Fallback: select the pre text
        const range = document.createRange();
        range.selectNode(jsonOut);
        window.getSelection().removeAllRanges();
        window.getSelection().addRange(range);
      }
    }

    // ── UI helpers ──
    function setLoading(on) {
      btnGen.disabled = on;
      btnGen.classList.toggle("loading", on);
      btnGen.querySelector(".btn-label").textContent = on ? "Generating…" : "Generate";
    }

    function showError(msg) {
      errBanner.textContent = msg;
      errBanner.classList.add("visible");
    }

    function hideError() {
      errBanner.classList.remove("visible");
    }

    function clearOutputs() {
      previewList.innerHTML = "";
      previewList.style.display = "none";
      previewEmpty.style.display = "flex";
      jsonWrap.style.display = "none";
      jsonEmpty.style.display = "flex";
      btnCopy.style.display = "none";
      currentJson = null;
    }

    // ── Syntax highlight ──
    // Simple regex-based highlighter for the JSON pre block
    function syntaxHighlight(json) {
      // Escape HTML first
      json = json
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");

      return json.replace(
        /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
        (match) => {
          let cls = "json-number";
          if (/^"/.test(match)) {
            cls = /:$/.test(match) ? "json-key" : "json-string";
          } else if (/true|false/.test(match)) {
            cls = "json-bool";
          } else if (/null/.test(match)) {
            cls = "json-null";
          }
          return `<span class="${cls}">${match}</span>`;
        }
      );
    }
  </script>
</body>
</html>
